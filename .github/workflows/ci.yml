name: Continuous Integration

on:
  push:
    branches:
      - main
      - feat/**
      - feature/**
      - fix/**
  pull_request:
    branches:
      - main

jobs:
  test:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install package
        run: |
          pip install -e .

      - name: Install test dependencies
        run: |
          pip install pytest

      - name: Verify package import
        run: |
          python -c "import remem; print(remem.__file__)"

      - name: Run unit tests
        run: |
          python -m pytest -v

      - name: Run example
        run: |
          python examples/rag_reuse.py

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install quality and packaging dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: |
          python -m ruff check .

      - name: Check formatting
        run: |
          python -m ruff format --check .

      - name: Type check
        run: |
          python -m mypy remem

      - name: Build distributions
        run: |
          python -m build

      - name: Validate distribution metadata
        run: |
          python -m twine check dist/*

  ann-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with ANN and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[ann,dev]"

      - name: Run suite with ANN backend
        run: |
          python -m pytest -v
